<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#073b2a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Крокодил" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icons/icon.svg" />
  <title>Крокодил — генератор слов</title>
  <style>
    :root{--bg1:#073b2a;--bg2:#03150f;--green:#38d66b;--green2:#159447;--lime:#c9ff69;--yellow:#ffdd57;--white:#f7fff8;--glass:rgba(255,255,255,.13);--border:rgba(255,255,255,.22);--shadow:rgba(0,0,0,.38)}
    *{box-sizing:border-box}html,body{height:100%}body{margin:0;min-height:100vh;font-family:Inter,system-ui,-apple-system,"Segoe UI",Arial,sans-serif;color:var(--white);overflow:hidden;-webkit-tap-highlight-color:transparent;background:radial-gradient(circle at 18% 12%,rgba(89,255,135,.25),transparent 28%),radial-gradient(circle at 82% 78%,rgba(255,221,87,.18),transparent 32%),linear-gradient(135deg,var(--bg1),var(--bg2))}
    .page{min-height:100vh;min-height:100svh;display:grid;place-items:center;padding:28px;position:relative}.title{position:absolute;top:max(24px,env(safe-area-inset-top));left:50%;transform:translateX(-50%);text-align:center;width:min(760px,90vw)}h1{margin:0;font-size:clamp(32px,6vw,72px);line-height:.92;text-shadow:0 18px 35px var(--shadow)}.subtitle{margin:12px 0 0;opacity:.78;font-size:clamp(14px,2vw,18px)}
    .gear,.install{position:fixed;z-index:20;width:54px;height:54px;border-radius:18px;border:1px solid var(--border);background:var(--glass);color:white;font-size:24px;cursor:pointer;backdrop-filter:blur(16px);box-shadow:0 16px 35px var(--shadow);transition:.2s}.gear{right:22px;top:max(22px,env(safe-area-inset-top))}.install{right:86px;top:max(22px,env(safe-area-inset-top));display:none}.gear:hover,.install:hover{transform:scale(1.05);background:rgba(255,255,255,.18)}.gear:hover{transform:rotate(25deg) scale(1.05)}
    .stage{width:min(900px,100%);min-height:560px;display:grid;place-items:center;position:relative;padding-top:100px}.croc{width:min(590px,90vw);height:205px;border:0;background:transparent;position:relative;cursor:pointer;filter:drop-shadow(0 25px 24px rgba(0,0,0,.42));transition:.18s;user-select:none}.croc:hover{transform:translateY(-5px) scale(1.02)}.croc:active{transform:translateY(2px) scale(.98)}
    .tail{position:absolute;left:-22px;top:78px;width:120px;height:82px;background:linear-gradient(#4cdf78,#0f7d3c);clip-path:polygon(0 50%,100% 0,78% 50%,100% 100%);border-radius:20px}.body{position:absolute;inset:48px 110px 28px 20px;border-radius:999px;background:linear-gradient(#58e983,#139044);border:5px solid #0d6d36}.snout{position:absolute;right:0;top:37px;width:220px;height:145px;background:linear-gradient(#63ee88,#159447);border:5px solid #0d6d36;border-radius:60px 110px 110px 60px}.belly{position:absolute;left:80px;top:105px;width:320px;height:38px;background:rgba(255,255,255,.16);border-radius:999px}
    .eye{position:absolute;top:14px;width:45px;height:45px;border-radius:50%;background:white;border:4px solid #0d6d36}.eye:after{content:"";position:absolute;left:15px;top:13px;width:13px;height:13px;border-radius:50%;background:#07170f}.eye.left{right:145px}.eye.right{right:78px}.mouth{position:absolute;right:16px;top:112px;width:190px;height:8px;background:#063a22;border-radius:20px;box-shadow:0 10px 0 rgba(255,255,255,.65)}.tooth{position:absolute;top:119px;width:0;height:0;border-left:9px solid transparent;border-right:9px solid transparent;border-top:21px solid #fff}.t1{right:160px}.t2{right:116px}.t3{right:74px}.t4{right:34px}.nostril{position:absolute;right:32px;top:76px;width:13px;height:13px;background:#063a22;border-radius:50%;box-shadow:-42px 0 0 #063a22}.spikes{position:absolute;left:95px;top:38px;display:flex;gap:22px}.spikes span{width:0;height:0;border-left:16px solid transparent;border-right:16px solid transparent;border-bottom:30px solid #baff70;filter:drop-shadow(0 3px 0 #0d6d36)}.label{position:absolute;left:135px;top:88px;font-weight:900;font-size:34px;letter-spacing:.04em;text-shadow:0 4px 0 rgba(0,0,0,.16)}
    .result{position:absolute;bottom:32px;left:50%;transform:translateX(-50%) scale(.95);min-width:min(760px,92vw);padding:26px 32px;border-radius:30px;text-align:center;background:rgba(255,255,255,.14);border:1px solid var(--border);backdrop-filter:blur(16px);box-shadow:0 20px 50px var(--shadow);opacity:0;pointer-events:none}.result.show{animation:reveal .9s cubic-bezier(.16,1,.3,1) forwards}.result .small{font-size:13px;text-transform:uppercase;letter-spacing:.18em;opacity:.72;margin-bottom:10px}.word{font-size:clamp(34px,7vw,82px);font-weight:950;line-height:1.05;text-wrap:balance}
    @keyframes reveal{0%{opacity:0;transform:translateX(-50%) translateY(30px) scale(.78);filter:blur(18px)}55%{opacity:1;transform:translateX(-50%) translateY(-8px) scale(1.04);filter:blur(0)}100%{opacity:1;transform:translateX(-50%) translateY(0) scale(1)}}.shake{animation:shake .7s ease}@keyframes shake{0%,100%{transform:translateX(0) rotate(0)}20%{transform:translateX(-12px) rotate(-3deg)}40%{transform:translateX(12px) rotate(3deg)}60%{transform:translateX(-8px) rotate(-2deg)}80%{transform:translateX(8px) rotate(2deg)}}.sparkle{position:absolute;width:12px;height:12px;border-radius:50%;background:var(--yellow);pointer-events:none;animation:pop .75s ease forwards}@keyframes pop{to{transform:translate(var(--x),var(--y)) scale(0);opacity:0}}
    .overlay{position:fixed;inset:0;background:rgba(0,0,0,.42);display:none;place-items:center;z-index:30;padding:20px}.overlay.open{display:grid}.modal{width:min(470px,95vw);border-radius:28px;padding:24px;background:rgba(8,45,32,.94);border:1px solid var(--border);backdrop-filter:blur(20px);box-shadow:0 30px 80px rgba(0,0,0,.5)}.modal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}.modal h2{margin:0;font-size:28px}.close{background:transparent;border:0;color:white;font-size:30px;cursor:pointer}.field{margin:16px 0}.field label{display:block;margin-bottom:8px;font-weight:700}select,input[type=number]{width:100%;padding:13px 14px;border-radius:16px;border:1px solid var(--border);background:rgba(255,255,255,.12);color:white;font-size:16px;outline:none}option{color:#111}.hint{font-size:13px;opacity:.78;margin-top:12px;line-height:1.45}.chips{display:flex;gap:10px;flex-wrap:wrap}.chip{padding:10px 14px;border-radius:999px;border:1px solid var(--border);background:rgba(255,255,255,.1);cursor:pointer}.chip input{margin-right:7px}.stats{position:fixed;left:22px;bottom:max(18px,env(safe-area-inset-bottom));opacity:.65;font-size:13px}.toast{position:fixed;left:50%;bottom:72px;transform:translateX(-50%) translateY(20px);opacity:0;z-index:40;padding:12px 16px;border-radius:16px;background:rgba(0,0,0,.56);border:1px solid var(--border);backdrop-filter:blur(10px);transition:.25s;text-align:center;max-width:min(92vw,520px)}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}@media(max-width:620px){.label{font-size:24px;left:100px;top:94px}.belly{width:220px}.croc{height:185px}.result{bottom:18px}.install{right:82px}}
  </style>
</head>
<body>
  <button class="install" id="install" title="Установить на экран">⬇</button><button class="gear" id="gear" title="Настройки">⚙</button>
  <main class="page"><section class="title"><h1>Крокодил</h1><p class="subtitle">Нажми на крокодила — получи слово для показа</p></section><section class="stage"><button class="croc" id="croc" aria-label="Сгенерировать слово"><div class="tail"></div><div class="body"></div><div class="belly"></div><div class="spikes"><span></span><span></span><span></span><span></span></div><div class="snout"></div><div class="eye left"></div><div class="eye right"></div><div class="nostril"></div><div class="mouth"></div><div class="tooth t1"></div><div class="tooth t2"></div><div class="tooth t3"></div><div class="tooth t4"></div><div class="label">ЖМИ!</div></button><div class="result" id="result"><div class="small">Покажи без слов</div><div class="word" id="word">?</div></div></section></main>
  <div class="stats" id="stats"></div><div class="toast" id="toast"></div>
  <div class="overlay" id="overlay"><div class="modal"><div class="modal-head"><h2>Настройки</h2><button class="close" id="close">×</button></div><div class="field"><label for="count">Сколько вариантов показать</label><input id="count" type="number" min="1" max="5" value="1"></div><div class="field"><label for="difficulty">Сложность</label><select id="difficulty"><option value="easy">Лёгкая</option><option value="medium" selected>Средняя</option><option value="hard">Сложная</option><option value="all">Любая</option></select></div><div class="field"><label for="mode">Тип задания</label><select id="mode"><option value="word">Одно слово</option><option value="phrase">Фраза из двух слов</option><option value="mixed" selected>Смешано</option></select></div><div class="field"><label>Категории</label><div class="chips"><label class="chip"><input type="checkbox" value="things" checked>Предметы</label><label class="chip"><input type="checkbox" value="actions" checked>Действия</label><label class="chip"><input type="checkbox" value="nature" checked>Природа</label><label class="chip"><input type="checkbox" value="abstract" checked>Абстрактное</label><label class="chip"><input type="checkbox" value="characters" checked>Персонажи</label></div></div><div class="hint">Можно установить на домашний экран. На iPhone: Safari → Поделиться → «На экран Домой». На Android кнопка установки появится сверху, если браузер поддерживает PWA.</div></div></div>
  <script>
    const bank=[["easy","word","things","зонт"],["easy","word","things","чайник"],["easy","word","things","чемодан"],["easy","word","things","телефон"],["easy","word","things","подушка"],["easy","word","things","велосипед"],["easy","word","things","лопата"],["easy","word","things","рюкзак"],["easy","word","things","зеркало"],["easy","word","things","магнит"],["easy","word","actions","прыжок"],["easy","word","actions","танец"],["easy","word","actions","зевота"],["easy","word","actions","чихание"],["easy","word","actions","рыбалка"],["easy","word","actions","зарядка"],["easy","word","actions","плавание"],["easy","word","actions","рисование"],["easy","word","nature","дождь"],["easy","word","nature","снег"],["easy","word","nature","молния"],["easy","word","nature","ветер"],["easy","word","nature","радуга"],["easy","word","nature","вулкан"],["easy","word","nature","айсберг"],["easy","word","nature","водопад"],["easy","word","characters","пират"],["easy","word","characters","робот"],["easy","word","characters","ведьма"],["easy","word","characters","клоун"],["easy","word","characters","рыцарь"],["easy","word","characters","динозавр"],["medium","word","things","калейдоскоп"],["medium","word","things","парашют"],["medium","word","things","телескоп"],["medium","word","things","компас"],["medium","word","things","лабиринт"],["medium","word","things","аквариум"],["medium","word","things","маятник"],["medium","word","things","штопор"],["medium","word","things","глобус"],["medium","word","things","барометр"],["medium","word","actions","жонглирование"],["medium","word","actions","маскировка"],["medium","word","actions","аплодисменты"],["medium","word","actions","подслушивание"],["medium","word","actions","погоня"],["medium","word","actions","капитуляция"],["medium","word","nature","метеорит"],["medium","word","nature","цунами"],["medium","word","nature","оазис"],["medium","word","nature","туман"],["medium","word","nature","паутина"],["medium","word","nature","экватор"],["medium","     const $=id=>document.getElementById(id),croc=$("croc"),result=$("result"),wordEl=$("word"),stats=$("stats"),overlay=$("overlay"),toast=$("toast"),settings={count:$("count"),difficulty:$("difficulty"),mode:$("mode")};$("gear").onclick=()=>overlay.classList.add("open");$("close").onclick=()=>overlay.classList.remove("open");overlay.onclick=e=>{if(e.target===overlay)overlay.classList.remove("open")};function cats(){return[...document.querySelectorAll(".chip input:checked")].map(x=>x.value)}function pool(){const d=settings.difficulty.value,m=settings.mode.value,c=cats();return bank.filter(([bd,bm,bc])=>(d==="all"||bd===d)&&(m==="mixed"||bm===m)&&c.includes(bc))}function pick(a,n){const b=[...a],o=[];while(b.length&&o.length<n)o.push(b.splice(Math.floor(Math.random()*b.length),1)[0]);return o}function sparkles(){for(let i=0;i<34;i++){const s=document.createElement("div");s.className="sparkle";s.style.left="50%";s.style.top="48%";s.style.setProperty("--x",Math.random()*620-310+"px");s.style.setProperty("--y",Math.random()*360-180+"px");s.style.animationDelay=Math.random()*.16+"s";document.body.appendChild(s);setTimeout(()=>s.remove(),900)}}function generate(){const p=pool(),n=Math.max(1,Math.min(5,Number(settings.count.value)||1));wordEl.textContent=p.length?pick(p,n).map(x=>x[3]).join(" • "):"Нет слов под эти настройки";croc.classList.remove("shake");result.classList.remove("show");void croc.offsetWidth;croc.classList.add("shake");sparkles();setTimeout(()=>result.classList.add("show"),420);stats.textContent="В словаре: "+bank.length+" заданий"}croc.onclick=generate;stats.textContent="В словаре: "+bank.length+" заданий";function showToast(t){toast.textContent=t;toast.classList.add("show");setTimeout(()=>toast.classList.remove("show"),5200)}if("serviceWorker"in navigator)window.addEventListener("load",()=>navigator.serviceWorker.register("./sw.js").catch(()=>{}));let deferredPrompt=null;window.addEventListener("beforeinstallprompt",e=>{e.preventDefault();deferredPrompt
