<!doctype html><html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="theme-color" content="#073b2a"><link rel="manifest" href="manifest.webmanifest"><title>Крокодил</title><style>*{box-sizing:border-box}body{margin:0;min-height:100vh;font-family:system-ui,Arial,sans-serif;color:white;background:radial-gradient(circle at 20% 10%,#2ee86b55,transparent 28%),linear-gradient(135deg,#073b2a,#03150f);overflow:hidden}.page{min-height:100vh;display:grid;place-items:center;padding:24px;position:relative}.top{text-align:center;position:absolute;top:24px;left:50%;transform:translateX(-50%);width:90vw}h1{font-size:clamp(40px,8vw,86px);margin:0;text-shadow:0 16px 30px #0008}.top p{opacity:.75}.gear,.install{position:fixed;top:22px;width:54px;height:54px;border-radius:18px;border:1px solid #ffffff40;background:#ffffff22;color:white;font-size:24px;z-index:4}.gear{right:22px}.install{right:86px;display:none}.croc{width:min(590px,90vw);height:210px;border:0;background:transparent;position:relative;cursor:pointer;filter:drop-shadow(0 24px 24px #0008);transition:.18s}.croc:hover{transform:translateY(-5px) scale(1.02)}.tail{position:absolute;left:-20px;top:80px;width:120px;height:82px;background:linear-gradient(#4cdf78,#0f7d3c);clip-path:polygon(0 50%,100% 0,78% 50%,100% 100%);border-radius:18px}.body{position:absolute;inset:50px 112px 30px 20px;border-radius:999px;background:linear-gradient(#58e983,#139044);border:5px solid #0d6d36}.snout{position:absolute;right:0;top:38px;width:220px;height:145px;background:linear-gradient(#63ee88,#159447);border:5px solid #0d6d36;border-radius:60px 110px 110px 60px}.belly{position:absolute;left:82px;top:108px;width:320px;height:38px;background:#ffffff24;border-radius:999px}.eye{position:absolute;top:15px;width:45px;height:45px;border-radius:50%;background:white;border:4px solid #0d6d36}.eye:after{content:"";position:absolute;left:15px;top:13px;width:13px;height:13px;border-radius:50%;background:#061b14}.e1{right:145px}.e2{right:78px}.mouth{position:absolute;right:18px;top:114px;width:190px;height:8px;background:#063a22;border-radius:20px;box-shadow:0 10px 0 #ffffffaa}.tooth{position:absolute;top:121px;border-left:9px solid transparent;border-right:9px solid transparent;border-top:21px solid #fff}.t1{right:160px}.t2{right:116px}.t3{right:74px}.t4{right:34px}.nose{position:absolute;right:34px;top:78px;width:13px;height:13px;background:#063a22;border-radius:50%;box-shadow:-42px 0 0 #063a22}.label{position:absolute;left:135px;top:90px;font-weight:900;font-size:34px;text-shadow:0 4px 0 #0003}.result{position:absolute;bottom:34px;left:50%;transform:translateX(-50%) scale(.9);width:min(760px,92vw);padding:26px 30px;border-radius:30px;text-align:center;background:#ffffff22;border:1px solid #ffffff40;backdrop-filter:blur(14px);box-shadow:0 20px 50px #0008;opacity:0}.result.show{animation:reveal .8s forwards}.small{font-size:13px;letter-spacing:.18em;text-transform:uppercase;opacity:.72}.word{font-size:clamp(34px,7vw,82px);font-weight:950;line-height:1.05}@keyframes reveal{to{opacity:1;transform:translateX(-50%) scale(1)}}.shake{animation:shake .7s}@keyframes shake{20%{transform:translateX(-12px) rotate(-3deg)}40%{transform:translateX(12px) rotate(3deg)}60%{transform:translateX(-8px) rotate(-2deg)}80%{transform:translateX(8px) rotate(2deg)}}.spark{position:absolute;width:12px;height:12px;border-radius:50%;background:#ffdd57;pointer-events:none;animation:pop .75s forwards}@keyframes pop{to{transform:translate(var(--x),var(--y)) scale(0);opacity:0}}.overlay{position:fixed;inset:0;background:#0008;display:none;place-items:center;z-index:5;padding:20px}.overlay.open{display:grid}.modal{width:min(470px,95vw);border-radius:28px;padding:24px;background:#082d20ee;border:1px solid #ffffff40;backdrop-filter:blur(16px)}.head{display:flex;justify-content:space-between;align-items:center}.close{background:0;border:0;color:white;font-size:32px}.field{margin:16px 0}.field label{display:block;margin-bottom:8px;font-weight:700}select,input{width:100%;padding:13px;border-radius:16px;border:1px solid #ffffff40;background:#ffffff22;color:white;font-size:16px}option{color:#111}.chips{display:flex;gap:10px;flex-wrap:wrap}.chip{padding:10px 14px;border-radius:999px;border:1px solid #ffffff40;background:#ffffff18}.stats{position:fixed;left:20px;bottom:18px;opacity:.65;font-size:13px}.toast{position:fixed;left:50%;bottom:70px;transform:translateX(-50%);background:#0009;padding:12px 16px;border-radius:16px;display:none}.toast.show{display:block}</style></head><body><button id="install" class="install">⬇</button><button id="gear" class="gear">⚙</button><main class="page"><div class="top"><h1>Крокодил</h1><p>Нажми на крокодила — получи слово для показа</p></div><button id="croc" class="croc"><div class="tail"></div><div class="body"></div><div class="belly"></div><div class="snout"></div><div class="eye e1"></div><div class="eye e2"></div><div class="nose"></div><div class="mouth"></div><div class="tooth t1"></div><div class="tooth t2"></div><div class="tooth t3"></div><div class="tooth t4"></div><div class="label">ЖМИ!</div></button><div id="result" class="result"><div class="small">Покажи без слов</div><div id="word" class="word">?</div></div></main><div id="stats" class="stats"></div><div id="toast" class="toast"></div><div id="overlay" class="overlay"><div class="modal"><div class="head"><h2>Настройки</h2><button id="close" class="close">×</button></div><div class="field"><label>Сколько вариантов</label><input id="count" type="number" min="1" max="5" value="1"></div><div class="field"><label>Сложность</label><select id="difficulty"><option value="easy">Лёгкая</option><option value="medium" selected>Средняя</option><option value="hard">Сложная</option><option value="all">Любая</option></select></div><div class="field"><label>Тип</label><select id="mode"><option value="word">Слово</option><option value="phrase">Фраза</option><option value="mixed" selected>Смешано</option></select></div><div class="field"><label>Категории</label><div class="chips"><label class="chip"><input type="checkbox" value="things" checked>Предметы</label><label class="chip"><input type="checkbox" value="actions" checked>Действия</label><label class="chip"><input type="checkbox" value="nature" checked>Природа</label><label class="chip"><input type="checkbox" value="abstract" checked>Абстрактное</label><label class="chip"><input type="checkbox" value="characters" checked>Персонажи</label></div></div><p>iPhone: Safari → Поделиться → На экран Домой. Android: Установить приложение.</p></div></div><script src="words-v2.js"></script><script>const fallback=[['easy','word','things','термос'],['medium','phrase','abstract','эффект бабочки'],['hard','phrase','abstract','синдром самозванца']];const bank=window.CROCODILE_WORDS?.length?window.CROCODILE_WORDS:fallback;const used=new Set();const $=id=>document.getElementById(id),croc=$('croc'),result=$('result'),word=$('word'),stats=$('stats'),overlay=$('overlay'),toast=$('toast');$('gear').onclick=()=>overlay.classList.add('open');$('close').onclick=()=>overlay.classList.remove('open');overlay.onclick=e=>{if(e.target===overlay)overlay.classList.remove('open')};function key(x){return x[0]+'|'+x[1]+'|'+x[2]+'|'+x[3]}function cats(){return[...document.querySelectorAll('.chip input:checked')].map(x=>x.value)}function allPool(){let d=$('difficulty').value,m=$('mode').value,c=cats();return bank.filter(([bd,bm,bc])=>(d==='all'||bd===d)&&(m==='mixed'||bm===m)&&c.includes(bc))}function pool(){let p=allPool(),fresh=p.filter(x=>!used.has(key(x)));if(!fresh.length&&p.length){used.clear();fresh=p}return fresh}function pick(a,n){let b=[...a],o=[];while(b.length&&o.length<n){let item=b.splice(Math.random()*b.length|0,1)[0];o.push(item);used.add(key(item))}return o}function sparks(){for(let i=0;i<32;i++){let s=document.createElement('div');s.className='spark';s.style.left='50%';s.style.top='48%';s.style.setProperty('--x',Math.random()*620-310+'px');s.style.setProperty('--y',Math.random()*360-180+'px');document.body.appendChild(s);setTimeout(()=>s.remove(),800)}}function gen(){let p=pool(),n=Math.max(1,Math.min(5,+$('count').value||1));word.textContent=p.length?pick(p,n).map(x=>x[3]).join(' • '):'Нет слов под эти настройки';croc.classList.remove('shake');result.classList.remove('show');void croc.offsetWidth;croc.classList.add('shake');sparks();setTimeout(()=>result.classList.add('show'),400);stats.textContent='В словаре: '+bank.length+' заданий · осталось: '+pool().length}croc.onclick=gen;stats.textContent='В словаре: '+bank.length+' заданий';if('serviceWorker'in navigator)addEventListener('load',()=>navigator.serviceWorker.register('./sw.js').catch(()=>{}));let pwa=null;addEventListener('beforeinstallprompt',e=>{e.preventDefault();pwa=e;$('install').style.display='block'});$('install').onclick=async()=>{if(pwa){pwa.prompt();await pwa.userChoice;pwa=null}else{toast.textContent='На iPhone: Safari → Поделиться → На экран Домой';toast.classList.add('show');setTimeout(()=>toast.classList.remove('show'),4000)}};</script></body></html>
